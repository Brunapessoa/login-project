<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Screen</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/media-query.css">
</head>

<body>
    <main>
        <section id="login">
            <div id="image">
                <!-- imagem nas CSS -->
            </div>
            <h1>Login</h1>
            <div id="welcTxt">
                <p>Welcome back!</p>
                <p>Enter your details to log in: </p>
            </div>
            <form method="post" autocomplete="on" id="formId">
                <p class="details">
                    <label for="idEmail">Email: </label><br>
                    <input type="email" name="email" id="idEmail" placeholder="Your email" required autocomplete="email"
                        maxlength="30">
                </p>
                <p class="details">
                    <label for="idPass">Password: </label><br>
                    <input type="password" name="" id="idPass" placeholder="Your password" required
                        autocomplete="current-password" minlength="5" max="10">
                </p>
                <p id="buttons">
                    <input type="submit" value="Enter" id="enterBtn">
                    <input type="button" value="Forgot my password" id="forgotBtn">
                </p>
            </form>
            <form id="formModal">
                <div id="modalForgotPass">
                    <!-- elementos criados no JS: 

                    <button type="button" id="closeBtn">X</button>
                    <p>Type your e-mail to password redefenition</p>
                    <label for="emailModal"></label>
                    <input type="email" name="email" id="emailModal" placeholder="Your email" required
                        autocomplete="email" maxlength="30"><br>
                    <button type="submit" value="Send" id="sendBtn">Send</button> 
                    
                    -->
                </div>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
